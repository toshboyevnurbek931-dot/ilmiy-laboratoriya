<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Ilmiy Fizika Laboratoriyalari</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #020617;
            --accent: #4ade80; /* Och yashil */
            --blue: #38bdf8;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0; background: #020617 url('https://static.vecteezy.com/system/resources/previews/002/675/139/non_2x/dark-blue-shining-atom-scheme-illustration-abstract-technology-background-for-computer-graphic-vector.jpg') no-repeat center center fixed;
            background-size: cover; color: white; display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 280px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px);
            height: 100vh; position: fixed; border-right: 1px solid var(--accent);
            display: flex; flex-direction: column; padding: 25px; z-index: 1000;
        }

        .user-box { text-align: center; margin-bottom: 30px; border-bottom: 1px solid rgba(74, 222, 128, 0.2); padding-bottom: 20px; }
        .user-icon { font-size: 60px; color: var(--accent); margin-bottom: 15px; }
        
        .reg-btn {
            background: var(--accent); color: #064e3b; border: none; padding: 12px;
            width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .reg-btn:hover { background: var(--blue); color: white; }

        /* Main Content */
        .main-content { margin-left: 280px; width: 100%; padding: 40px; background: rgba(2, 6, 23, 0.7); min-height: 100vh; }
        .lab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }

        .lab-card {
            background: var(--glass); border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 20px; border-radius: 15px; text-decoration: none; color: white;
            transition: 0.3s; text-align: center; backdrop-filter: blur(5px);
        }
        .lab-card:hover { transform: translateY(-5px); border-color: var(--accent); background: rgba(74, 222, 128, 0.1); }

        /* Modal (Ro'yxatdan o'tish) */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center;
        }
        .modal-content {
            background: #1e293b; padding: 30px; border-radius: 20px; border: 1px solid var(--accent);
            width: 350px; text-align: center;
        }
        .modal-content input {
            width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155;
            background: #0f172a; color: white;
        }

        .dev-footer { margin-top: auto; padding: 15px; background: rgba(74, 222, 128, 0.1); border-radius: 10px; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="user-box">
            <i class="fas fa-user-circle user-icon"></i>
            <p id="userName">Foydalanuvchi</p>
            <button class="reg-btn" onclick="openModal()">RO'YXATDAN O'TISH</button>
        </div>

        <div class="dev-footer">
            <p style="color: var(--accent); font-weight: bold;"><i class="fas fa-code"></i> Dasturchi</p>
            <p>Nurbek</p>
            <p>📞 +998993991630</p>
        </div>
    </div>

    <div class="main-content">
        <h1 style="text-align: center; letter-spacing: 5px;">ILMIY FIZIKA LABORATORIYALARI</h1>
        <div class="lab-grid">
            {% for lab in labs %}
            <a href="/lab{{ lab.id }}" class="lab-card">
                <span style="display: block; font-weight: bold; margin-bottom: 5px;">{{ lab.id }}-Laboratoriya</span>
                <small style="color: var(--blue);">{{ lab.title }}</small>
            </a>
            {% endfor %}
        </div>
    </div>

    <!-- Ro'yxatdan o'tish Modali -->
    <div id="regModal" class="modal">
        <div class="modal-content">
            <h3>Ro'yxatdan o'tish</h3>
            <input type="text" id="fullName" placeholder="Ism Familiya Sharif">
            <input type="tel" id="phoneNum" placeholder="+998 90 123 45 67">
            <button class="reg-btn" onclick="submitReg()">YUBORISH</button>
            <button style="background:none; color:#94a3b8; border:none; margin-top:10px; cursor:pointer;" onclick="closeModal()">Yopish</button>
        </div>
    </div>

    <script>
        function openModal() { document.getElementById('regModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('regModal').style.display = 'none'; }

        async function submitReg() {
            const name = document.getElementById('fullName').value;
            const tel = document.getElementById('phoneNum').value;
            
            if(!name || !tel) return alert("Barcha maydonlarni to'ldiring!");

            const response = await fetch('/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({fullname: name, phone: tel})
            });
            
            const result = await response.json();
            if(result.status === 'success') {
                document.getElementById('userName').innerText = name;
                alert("Ro'yxatdan muvaffaqiyatli o'tdingiz!");
                closeModal();
            }
        }
    </script>
</body>
</html>
