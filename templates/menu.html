<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Onlayn Laboratoriya Markazi</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            /* Rasm yorqin ko'rinishi uchun shaffoflikni kamaytirdik (0.3) */
            background: linear-gradient(rgba(15, 23, 42, 0.3), rgba(15, 23, 42, 0.3)), 
                        url('https://www.anl.gov/sites/www/files/styles/article_teaser_16x9/public/2023-08/16x9-PSE_Nature%20CommFeatured%20Image_Final01_2023July26.png?h=8abcec71&itok=a-kP-A2H');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: rgb(145, 247, 11); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            margin: 0;
        }

        .menu-container { 
            display: grid; 
            /* Ekran kengligiga qarab 1, 2 yoki 3 ustun bo'ladi */
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px; 
            width: 90%;
            max-width: 1100px;
            padding: 20px;
        }

        .lab-card { 
            /* Kartochkalarni aniqroq qilish uchun fonni biroz to'qroq qildik */
            background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: blur(8px);
            padding: 30px; 
            border-radius: 20px; 
            border: 2px solid rgba(56, 189, 248, 0.5); 
            text-decoration: none; 
            color: rgb(248, 224, 10); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .lab-card:hover { 
            background: #38bdf8; 
            color: #0f172a; 
            transform: translateY(-12px); 
            border-color: white;
            box-shadow: 0 15px 45px rgba(56, 189, 248, 0.6);
        }

        h1 {
            margin-bottom: 50px;
            text-shadow: 3px 3px 15px rgba(0,0,0,0.8);
            font-size: 3rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        h3 { margin-top: 0; font-size: 1.5rem; }
        p { opacity: 0.9; font-size: 1rem; }
    </style>
</head>
<body>
    <h1>Mening Raqamli Laboratoriyalarim</h1>
    <div class="menu-container">
        <a href="/lab3" class="lab-card">
            <h3>3-Laboratoriya ishi</h3>
            <p>Faradey effekti</p>
        </a>
        <a href="/lab4" class="lab-card">
            <h3>4-Laboratoriya ishi</h3>
            <p>NYEM Uyg'otish Spektri Tadqiqoti</p>
        </a>
        <a href="/lab5" class="lab-card">
            <h3>5-Laboratoriya ishi</h3>
            <p>Pikering Seriyasi</p>
        </a>
        <a href="/lab6" class="lab-card">
            <h3>6-Laboratoriya ishi</h3>
            <p>Nodir yer metallari</p>
        </a>
    </div>
</body>
</html>
